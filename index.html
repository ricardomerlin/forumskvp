<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Spot Categories Formatter</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 30px;
      max-width: 800px;
      margin: auto;
    }

    input {
      width: 100%;
      padding: 8px;
      margin-bottom: 10px;
      font-size: 14px;
    }

    button {
      padding: 10px 15px;
      font-size: 14px;
      cursor: pointer;
    }

    pre {
      background: #f4f4f4;
      padding: 15px;
      overflow-x: auto;
      margin-top: 20px;
    }

    .error {
      color: red;
      margin-top: 10px;
    }
  </style>
</head>
<body>

<h2>Get Spot Categories</h2>

<label>Spot ID</label>
<input type="text" id="spotId" placeholder="Enter Spot ID" />

<label>Access Token</label>
<input type="text" id="accessToken" placeholder="Enter Access Token" />

<button id="fetchBtn">Fetch Categories</button>

<div class="error" id="error"></div>

<pre id="output"></pre>

<script>
document.getElementById("fetchBtn").addEventListener("click", async () => {
  const spotId = document.getElementById("spotId").value.trim();
  const token = document.getElementById("accessToken").value.trim();
  const output = document.getElementById("output");
  const errorDiv = document.getElementById("error");

  output.textContent = "";
  errorDiv.textContent = "";

  if (!spotId || !token) {
    errorDiv.textContent = "Spot ID and Access Token are required.";
    return;
  }

  try {
    const response = await fetch(
      "https://api-2-0.spot.im/v1.0.0/forums/v1/admin/publishers/categories",
      {
        method: "GET",
        headers: {
          "x-access-token": token,
          "x-spot-id": spotId
        }
      }
    );

    if (!response.ok) {
      throw new Error("Request failed: " + response.status);
    }

    const data = await response.json();

    // Transform format
    const formatted = {};

    data.forEach(category => {
      formatted[category.name] = category.sub_categories.map(sub => sub.name);
    });

    output.textContent = JSON.stringify(formatted, null, 2);

  } catch (err) {
    errorDiv.textContent = "Error: " + err.message + 
      " (This is likely a CORS issue if running locally)";
  }
});
</script>

</body>
</html>
